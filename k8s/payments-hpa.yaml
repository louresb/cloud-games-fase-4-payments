apiVersion: v1
kind: ServiceAccount
metadata:
  name: payments-sa
  namespace: fcg-apps
  labels:
    app: payments-api
  annotations:
    eks.amazonaws.com/role-arn: ""
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payments-api
  namespace: fcg-apps
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payments-deployment
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
